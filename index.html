<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大衛的五顆石頭 ─ 互動關卡（版本 D）</title>
<style>
  :root{
    --bg:#0f1b2d; --panel:#16263d; --ink:#f4f7fb; --muted:#9fb3cc;
    --c-pray:#e5484d; --c-bible:#f5a623; --c-worship:#30a46c; --c-fellow:#3b82f6; --c-spirit:#f4eedc;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#1e3454,#0f1b2d 60%);
    color:var(--ink); min-height:100%; overflow-x:hidden;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 64px;}
  header.top{text-align:center;margin:14px 0 26px;}
  header.top h1{font-size:clamp(26px,4.5vw,44px);margin:0;letter-spacing:2px;}
  header.top p{color:var(--muted);margin:8px 0 0;font-size:clamp(13px,2vw,17px);}
  .verse{color:#ffd479;font-weight:700;}
  .verB{display:inline-block;margin-left:8px;background:#26405f;color:#cfe0f5;
        font-size:12px;font-weight:800;padding:2px 10px;border-radius:999px;letter-spacing:1px;vertical-align:middle;}

  .bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .btn{cursor:pointer;border:none;border-radius:999px;padding:10px 18px;font-size:15px;
       font-family:inherit;font-weight:700;color:#fff;background:#26405f;transition:.15s;}
  .btn:hover{filter:brightness(1.12);}
  .btn.ghost{background:transparent;border:1px solid #34537a;color:var(--muted);}
  .crumb{color:var(--muted);font-size:15px;}
  .crumb b{color:var(--ink);}

  .screen{display:none;animation:fade .25s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  @media(max-width:640px){.cards{grid-template-columns:1fr;}}
  .card{position:relative;border-radius:22px;padding:34px 28px;cursor:pointer;color:#fff;
        min-height:160px;display:flex;flex-direction:column;justify-content:space-between;
        box-shadow:0 14px 34px rgba(0,0,0,.35);transition:.18s;overflow:hidden;}
  .card:hover{transform:translateY(-4px);box-shadow:0 20px 44px rgba(0,0,0,.5);}
  .card .stone{position:absolute;right:-10px;top:-18px;font-size:120px;opacity:.16;}
  .card .name{font-size:30px;font-weight:900;letter-spacing:3px;}
  .card .en{opacity:.85;font-size:15px;margin-top:2px;letter-spacing:1px;}
  .card .go{align-self:flex-end;font-size:15px;font-weight:700;opacity:.9;}
  .card .mode{position:absolute;left:28px;bottom:26px;font-size:13px;font-weight:700;
        background:rgba(255,255,255,.22);padding:4px 12px;border-radius:999px;}
  .card.pray{background:linear-gradient(135deg,#e5484d,#a3262b);}
  .card.bible{background:linear-gradient(135deg,#f5a623,#c47b00);}
  .card.worship{background:linear-gradient(135deg,#30a46c,#1d6b46);}
  .card.fellow{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
  .card.spirit{background:#f4eedc;color:#1f2d44;grid-column:1/-1;min-height:130px;border:1px solid #e6dcc0;}
  .card.spirit .en{opacity:.65;}
  .card.spirit .go{opacity:.7;}
  .card.spirit .stone{opacity:.10;}
  .card.spirit .mode{background:#ebe3cf;color:#5a5238;}

  .cat-title{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .dot{width:22px;height:22px;border-radius:50%;}
  .cat-title h2{margin:0;font-size:clamp(24px,4vw,34px);letter-spacing:2px;}
  .cat-sub{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.7;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:560px;margin:0 auto;}
  @media(max-width:560px){.grid{gap:12px;}}
  .num{aspect-ratio:1/1;border-radius:18px;border:none;cursor:pointer;color:#fff;
       font-family:inherit;font-weight:900;
       display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;
       box-shadow:0 8px 20px rgba(0,0,0,.3);transition:.15s;}
  .num .n{font-size:clamp(26px,7vw,44px);line-height:1;}
  .num .stars{font-size:13px;margin-top:6px;letter-spacing:1px;opacity:.95;}
  .num:hover{transform:translateY(-3px);filter:brightness(1.1);}
  .num.light{color:#1f2d44;border:2px solid #d4dbe6;box-shadow:0 8px 20px rgba(0,0,0,.18);}
  .num.used{background:#33445c !important;color:#7e94ad !important;border-color:#33445c !important;box-shadow:none;}
  .num.used .stars{opacity:.5;}
  .num.used::after{content:"已選";position:absolute;bottom:8px;font-size:12px;font-weight:700;letter-spacing:1px;}
  .num .check{position:absolute;top:6px;right:10px;font-size:18px;display:none;}
  .num.used .check{display:block;color:#5ad18f;}
  /* ---- 隊伍標記：黑隊／白隊（灰＝平手，沿用 used 灰底） ---- */
  .num.mk-black{background:#0d1117 !important;color:#eaf1fb !important;border:3px solid #eaf1fb !important;box-shadow:none;}
  .num.mk-white{background:#f4f7fb !important;color:#1f2d44 !important;border:3px solid #aebbcd !important;box-shadow:none;}
  .num.mk-black::after{content:"黑隊";position:absolute;bottom:8px;font-size:12px;font-weight:700;letter-spacing:1px;color:#eaf1fb;}
  .num.mk-white::after{content:"白隊";position:absolute;bottom:8px;font-size:12px;font-weight:700;letter-spacing:1px;color:#1f2d44;}
  .num.mk-white .check{color:#1c8a4e;}
  /* ---- 格子左下角 3 顆切換圓點 ---- */
  .tdots{position:absolute;left:9px;bottom:7px;display:flex;gap:5px;z-index:2;}
  .tdot{width:13px;height:13px;border-radius:50%;cursor:pointer;border:2px solid #90a4bd;transition:.12s;}
  .tdot:hover{transform:scale(1.35);}
  .tdot.t-black{background:#0d1117;}
  .tdot.t-white{background:#f4f7fb;}
  .tdot.t-gray{background:#7e94ad;}
  .tdot.on{transform:scale(1.25);box-shadow:0 0 0 3px #ffd76a;border-color:#fff;}
  /* ---- 計分板 ---- */
  .scoreboard{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;margin:0 0 20px;
              font-size:15px;font-weight:800;letter-spacing:1px;}
  .scoreboard .stt{color:var(--muted);font-weight:700;letter-spacing:2px;}
  .scoreboard span.pill{display:inline-flex;align-items:center;gap:8px;background:#132339;border:1px solid #2b466a;
                        border-radius:999px;padding:6px 18px;color:#dce8f8;}
  .sw{width:14px;height:14px;border-radius:50%;display:inline-block;border:2px solid #90a4bd;}
  .sw.b{background:#0d1117;} .sw.w{background:#f4f7fb;} .sw.g{background:#7e94ad;}
  /* ---- 彈窗底部計分列 ---- */
  .mscore{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .mscore .lbl{color:var(--muted);font-size:clamp(14px,1.3vw,20px);font-weight:700;}
  .sbtn{cursor:pointer;border-radius:999px;padding:8px 22px;font-weight:800;font-family:inherit;
        font-size:clamp(14px,1.4vw,22px);border:2px solid #44557a;background:#16273f;color:#cfe0f5;transition:.12s;}
  .sbtn:hover{filter:brightness(1.25);}
  .sbtn.on{border-color:#ffd76a;box-shadow:0 0 0 3px rgba(255,215,106,.35);color:#fff;}
  .legend{text-align:center;color:var(--muted);font-size:13px;margin-top:18px;line-height:1.8;}

  .overlay{position:fixed;inset:0;background:rgba(6,12,22,.85);backdrop-filter:blur(3px);
           display:none;align-items:center;justify-content:center;padding:1.2vh 1vw;z-index:50;}
  .overlay.active{display:flex;animation:fade .2s ease;}
  .modal{background:var(--panel);border-radius:18px;max-width:1700px;width:98vw;
         height:97vh;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);
         border-top:10px solid var(--accent);display:flex;flex-direction:column;}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 44px 4px;flex:0 0 auto;}
  .modal .tag{display:inline-flex;align-items:center;gap:12px;font-weight:800;font-size:clamp(20px,2vw,30px);flex-wrap:wrap;}
  .modal .tag .mdot{width:clamp(18px,1.6vw,26px);height:clamp(18px,1.6vw,26px);border-radius:50%;}
  .modal .qno{background:var(--accent);color:#fff;border-radius:14px;padding:2px 22px;font-weight:900;font-size:clamp(24px,2.4vw,40px);}
  .modal.light .qno{color:#1f2d44;}
  .modal.light .mdot{box-shadow:0 0 0 2px #44557a;}
  .diff{display:inline-flex;align-items:center;gap:8px;background:#0f2036;border:1px solid #2b466a;
        border-radius:999px;padding:5px 18px;font-size:clamp(17px,1.7vw,26px);font-weight:700;color:#ffd479;}
  .diff .grade{color:var(--muted);font-weight:600;}
  .modal .body{padding:4px 48px 14px;flex:1 1 auto;overflow-y:auto;}
  .qcols{display:flex;gap:34px;align-items:stretch;height:100%;}
  .qleft{flex:1 1 50%;min-width:0;min-height:0;overflow-y:auto;padding-right:8px;}
  .qright{flex:1 1 50%;min-width:0;min-height:0;overflow-y:auto;border-left:1px solid #29405f;padding-left:34px;}
  @media(max-width:900px){.qcols{flex-direction:column;gap:14px;height:auto;}
    .qleft,.qright{overflow:visible;}
    .qright{border-left:none;padding-left:0;border-top:1px solid #29405f;padding-top:14px;}}
  .modal h3{font-size:clamp(24px,2.6vw,42px);line-height:1.4;margin:12px 0 14px;}
  .lead{font-weight:900;font-size:clamp(20px,2vw,32px);line-height:1.3;margin:8px 0 12px;white-space:nowrap;}
  @media(max-width:900px){.lead{white-space:normal;}}
  .lbl{font-weight:800;margin:8px 0 10px;font-size:clamp(20px,2vw,30px);}
  .recite{background:#0f2036;border:1px solid #2b466a;border-radius:16px;
          padding:20px 26px;line-height:1.9;font-size:clamp(22px,2.3vw,38px);color:#e9eff7;margin:14px 0;}
  .prayerbox{background:#132a44;border:1px solid #2c4f87;border-radius:16px;
          padding:18px 24px;line-height:1.7;font-size:clamp(18px,1.9vw,30px);color:#e7f0fb;margin:12px 0;font-style:normal;}
  .prayerbox .pref{display:block;margin-top:14px;color:var(--muted);font-size:clamp(16px,1.5vw,24px);font-style:normal;}
  .ask{font-weight:800;font-size:clamp(22px,2.3vw,36px);margin:10px 0 6px;}
  img.qimg{width:100%;max-height:50vh;object-fit:contain;border-radius:14px;border:1px solid #2b466a;margin:10px 0;display:block;background:#0f2036;}
  .opts{margin:10px 0 6px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{background:#12294a;border:1px solid #34558a;border-radius:14px;padding:16px 20px;font-size:clamp(20px,2vw,32px);
       line-height:1.35;color:#eef4fb;display:flex;gap:14px;align-items:center;min-height:clamp(64px,7vw,96px);}
  .opt .ol{font-weight:900;color:#ffd479;min-width:clamp(26px,2vw,40px);font-size:clamp(23px,2.2vw,36px);}
  @media(max-width:640px){.opts{grid-template-columns:1fr;}}
  .cond{display:flex;gap:10px;align-items:flex-start;background:#13301f;border:1px solid #2c6a44;
        color:#bff0d2;border-radius:14px;padding:16px 22px;font-size:clamp(18px,1.9vw,28px);margin-top:16px;line-height:1.6;}
  .cond.fellow{background:#142640;border-color:#2c4f87;color:#bcd5f7;}
  .toggleBox{margin-top:16px;}
  .toggleBox > .togContent{display:none;}
  .toggleBox.show > .togContent{display:block;}
  .btn.accent{background:var(--accent);}
  .modal.light .btn.accent{color:#1f2d44;}
  .btn.beige{background:#e8e3d5;color:#3f3a2c;border:1px solid #cbc4b0;}
  .modal .btn{font-size:clamp(16px,1.7vw,24px);padding:10px 24px;}
  .ans{margin-top:12px;background:#2a1722;border:1px solid #6a2c45;color:#ffc4d8;
       border-radius:12px;padding:15px 22px;font-size:clamp(21px,2.2vw,34px);line-height:1.5;font-weight:800;}
  .ans.verse{background:#0f2036;border-color:#2b466a;color:#e9eff7;}
  .ans .full{display:block;margin-top:10px;color:var(--muted);font-size:clamp(16px,1.5vw,24px);font-weight:400;}
  audio{width:100%;margin-top:10px;height:52px;}
  .audionote{color:var(--muted);font-size:clamp(14px,1.4vw,20px);margin-top:10px;line-height:1.6;}
  .mfoot{padding:6px 44px 20px;text-align:center;flex:0 0 auto;}
  .x{cursor:pointer;font-size:clamp(30px,3vw,46px);line-height:1;color:var(--muted);border:none;background:none;}
  .x:hover{color:#fff;}
  .resetbar{text-align:center;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>🪨 大衛的五顆石頭 <span class="verB">版本 D</span></h1>
    <p>主題經文：撒母耳記上 17:4–49 ｜ <span class="verse">上帝賜的力量，使我得勝！</span></p>
  </header>

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="cards" id="home-cards"></div>
    <div class="resetbar"><button class="btn ghost" onclick="resetAll()">🔄 重設所有「已選」記錄</button></div>
  </section>

  <!-- ===== NUMBER GRID ===== -->
  <section id="grid" class="screen">
    <div class="bar">
      <button class="btn" onclick="go('home')">⟵ 回主頁</button>
      <button class="btn ghost" onclick="clearCurrent()">🧹 清除此主題已選</button>
      <span class="crumb"><b id="g-name"></b></span>
    </div>
    <div class="cat-title"><span class="dot" id="g-dot"></span><h2 id="g-h2"></h2></div>
    <p class="cat-sub" id="g-sub"></p>
    <div class="scoreboard" id="g-score"></div>
    <div class="grid" id="g-grid"></div>
    <div class="legend" id="g-legend"></div>
  </section>
</div>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="mhead">
      <span class="tag"><span class="mdot" id="m-dot"></span><span id="m-tag"></span> <span class="qno" id="m-no"></span></span>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="body" id="m-body"></div>
    <div class="mfoot"><div class="mscore" id="m-score"></div><button class="btn ghost" onclick="closeModal()">⟵ 返回號碼選單</button></div>
  </div>
</div>

<script>
/* ================= DATA（版本 B） ================= */
const THEMES = [
 { key:"pray", name:"禱告", en:"PRAYER", icon:"🙏", color:"#e5484d", graded:false, mode:"禱告詞卡 · 9 題",
   sub:"每一題都是一段聖經中的禱告；先讀（或聽）禱告詞，再從中找出答案。",
   items:[
     {kind:"card",
      prayer:"我們在天上的父，願人都尊你的名為聖。願你的國降臨，願你的旨意行在地上，如同行在天上。我們日用的飲食，今日賜給我們。免我們的債，如同我們免了人的債。不叫我們遇見試探，救我們脫離兇惡。因為國度、權柄、榮耀，全是你的，直到永遠。阿們。",
      ref:"馬太福音 6:9–13（主禱文）",
      ask:"主禱文記載在聖經的哪一處？",
      opts:["馬太福音第 6 章","路加福音第 18 章","詩篇第 23 篇","撒母耳記上第 1 章"], correct:0},
     {kind:"card",
      prayer:"哈拿心裡愁苦，就痛痛哭泣，向耶和華祈禱，許願說：「萬軍之耶和華啊，你若垂顧婢女的苦情，眷念不忘婢女，賜我一個兒子，我必使他終身歸與耶和華，不用剃頭刀剃他的頭。」哈拿在耶和華面前不住地祈禱，她心中默禱，只動嘴唇，不出聲音，因此以利以為她喝醉了。",
      ref:"撒母耳記上 1:10–15（哈拿的禱告）",
      ask:"哈拿向神求什麼？",
      opts:["財富","一個兒子","長壽","智慧"], correct:1},
     {kind:"card",
      prayer:"耶穌向那些仗著自己是義人、藐視別人的人講了這個比喻：有兩個人上殿裡去禱告，一個是法利賽人，一個是稅吏。法利賽人站著，自言自語地禱告說：「神啊，我感謝你，我不像別人勒索、不義、姦淫，也不像這個稅吏。我一個禮拜禁食兩次，凡我所得的都捐上十分之一。」那稅吏遠遠地站著，連舉目望天也不敢，只捶著胸說：「神啊，開恩可憐我這個罪人！」",
      ref:"路加福音 18:9–14（法利賽人與稅吏）",
      ask:"法利賽人禱告說，他一個禮拜禁食幾次？",
      opts:["一次","兩次","三次","七次"], correct:1},
     {kind:"card",
      prayer:"神啊，求你按你的慈愛憐恤我，按你豐盛的慈悲塗抹我的過犯。求你將我的罪孽洗除淨盡，並潔除我的罪。因為我知道我的過犯，我的罪常在我面前。神啊，求你為我造清潔的心，使我裡面重新有正直的靈。不要丟棄我，使我離開你的面；不要從我收回你的聖靈。",
      ref:"詩篇 51:1–11（大衛悔罪的禱告）",
      ask:"大衛求神為他造一顆怎樣的心？",
      opts:["剛強的心","喜樂的心","智慧的心","清潔的心"], correct:3},
     {kind:"card",
      prayer:"在基遍，夜間的夢中，耶和華向所羅門顯現，說：「你願我賜你什麼，你可以求。」所羅門說：「耶和華我的神啊，如今你使僕人接續我父親大衛作王；但我是幼童，不知道應當怎樣出入。所以求你賜我智慧，可以判斷你的民，能辨別是非；不然，誰能判斷這眾多的民呢？」",
      ref:"列王紀上 3:5–9（所羅門的禱告）",
      ask:"所羅門沒有求財富或長壽，他向神求什麼？",
      opts:["能辨別是非的智慧","強大的軍隊","更多的財寶","以上皆是"], correct:0},
     {kind:"card",
      prayer:"雅比斯比他眾弟兄更尊貴，他母親給他起名叫雅比斯，意思說：我生他甚是痛苦。雅比斯求告以色列的神說：「甚願你賜福與我，擴張我的境界，願你的手常與我同在，保佑我不遭患難，不受艱苦。」神就應允他所求的。",
      ref:"歷代志上 4:9–10（雅比斯的禱告）",
      ask:"雅比斯求神賜福，並且「擴張」他的什麼？",
      opts:["財產","名聲","境界（地界）","家族人數"], correct:2},
     {kind:"card",
      prayer:"耶穌同門徒來到一個地方，名叫客西馬尼，就憂愁起來，極其難過，對他們說：「我心裡甚是憂傷，幾乎要死。」他就稍往前走，俯伏在地禱告說：「我父啊，倘若可行，求你叫這杯離開我；然而不要照我的意思，只要照你的意思。」第二次又去禱告說：「我父啊，這杯若不能離開我，必要我喝，就願你的旨意成全。」",
      ref:"馬太福音 26:36–42（客西馬尼園的禱告）",
      ask:"耶穌去到哪個地方，俯伏禱告？",

const GRADE = {1:"1·2 年級", 2:"3·4 年級", 3:"5·6 年級"};
function stars(n){ return "★".repeat(n); }

/* ================= STATE ================= */
let curKey="pray";
const KEY="stones_visited_D_v1";
let visited = JSON.parse(localStorage.getItem(KEY) || "{}");
function saveVisited(){ localStorage.setItem(KEY, JSON.stringify(visited)); }
function vkey(k,n){ return k+"_"+n; }
/* 隊伍標記：'black' | 'white' | 'tie'（沒有值＝尚未計分） */
const MKEY="stones_marks_D_v1";
let marks = JSON.parse(localStorage.getItem(MKEY) || "{}");
function saveMarks(){ localStorage.setItem(MKEY, JSON.stringify(marks)); }
/* 設定／取消標記：再點一次同一色＝取消 */
function setMark(k,i,val){
  const key=vkey(k,i);
  if(marks[key]===val) delete marks[key]; else marks[key]=val;
  visited[key]=true;
  saveMarks(); saveVisited(); openTheme(k);
}
function scoreCount(){
  let b=0,w=0,g=0;
  THEMES.forEach(t=>t.items.forEach((_,i)=>{
    const m=marks[vkey(t.key,i)];
    if(m==='black') b++; else if(m==='white') w++; else if(m==='tie') g++;
  }));
  return {b,w,g};
}
function renderScore(){
  const el=document.getElementById('g-score'); if(!el) return;
  const s=scoreCount();
  el.innerHTML='<span class="stt">五主題總計</span>'+
    '<span class="pill"><i class="sw b"></i>黑隊 '+s.b+'</span>'+
    '<span class="pill"><i class="sw w"></i>白隊 '+s.w+'</span>'+
    '<span class="pill"><i class="sw g"></i>平手 '+s.g+'</span>';
}
function theme(k){ return THEMES.find(t=>t.key===k); }

/* ================= NAV ================= */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---- HOME cards ---- */
function buildHome(){
  const wrap=document.getElementById('home-cards');
  wrap.innerHTML="";
  THEMES.forEach(t=>{
    const cls = t.key==="pray"?"pray":t.key==="bible"?"bible":t.key==="worship"?"worship":t.key==="fellow"?"fellow":"spirit";
    const div=document.createElement('div');
    div.className="card "+cls;
    div.onclick=()=>openTheme(t.key);
    div.innerHTML='<span class="stone">'+t.icon+'</span>'+
      '<div><div class="name">'+t.name+'</div><div class="en">'+t.en+'</div></div>'+
      '<span class="mode">'+t.mode+'</span>'+
      '<div class="go">點我進入 ➜</div>';
    wrap.appendChild(div);
  });
}

function openTheme(k){
  curKey=k; const t=theme(k);
  document.documentElement.style.setProperty('--accent',t.color);
  document.getElementById('g-name').textContent=t.name;
  document.getElementById('g-h2').textContent=t.name;
  document.getElementById('g-dot').style.background=t.color;
  document.getElementById('g-sub').textContent=t.sub;
  document.getElementById('g-legend').innerHTML =
    "點擊號碼查看內容；點過的號碼會變灰並標示「已選」。<br>" +
    "每格左下角 <b>⚫⚪⬜</b> 可標記哪一隊答對：黑隊變黑格、白隊變白格、灰＝平手／還原；再點一次同一色可取消。" +
    "題目彈窗下方也能直接計分。要全部歸零用上方「清除此主題已選」。";
  const grid=document.getElementById('g-grid'); grid.innerHTML="";
  t.items.forEach((it,i)=>{
    const b=document.createElement('button');
    b.className='num'; b.style.background=t.color;
    if(t.light) b.classList.add('light');
    const mk=marks[vkey(k,i)]||'';
    let inner='<span class="check">✓</span><span class="n">'+(i+1)+'</span>';
    if(t.graded && it.star) inner+='<span class="stars">'+stars(it.star)+'</span>';
    inner+='<span class="tdots">'+
      '<span class="tdot t-black'+(mk==='black'?' on':'')+'" data-v="black" title="黑隊答對"></span>'+
      '<span class="tdot t-white'+(mk==='white'?' on':'')+'" data-v="white" title="白隊答對"></span>'+
      '<span class="tdot t-gray'+(mk==='tie'?' on':'')+'" data-v="tie" title="平手／還原"></span>'+
      '</span>';
    b.innerHTML=inner;
    if(visited[vkey(k,i)]) b.classList.add('used');
    if(mk==='black'||mk==='white') b.classList.add('mk-'+mk);
    b.onclick=()=>openItem(i,b);
    b.querySelectorAll('.tdot').forEach(d=>{
      d.onclick=(e)=>{ e.stopPropagation(); setMark(k,i,d.dataset.v); };
    });
    grid.appendChild(b);
  });
  renderScore();
  go('grid');
}

function clearCurrent(){
  const t=theme(curKey);
  if(!confirm('確定清除「'+t.name+'」的所有已選與計分記錄嗎？')) return;
  t.items.forEach((_,i)=>{ delete visited[vkey(curKey,i)]; delete marks[vkey(curKey,i)]; });
  saveVisited(); saveMarks(); openTheme(curKey);
}

/* ================= MODAL ================= */
function tog(btn){ btn.parentElement.classList.toggle('show'); }
/* 公布題目：顯示/隱藏題目的同時，自動把內容（禱告詞／圖片）收起來，避免忘記隱藏 */
function publish(btn){
  btn.parentElement.classList.toggle('show');
  const box = document.querySelector('#m-body .hidebox');
  if(box) box.classList.remove('show');
}
/* ---- 彈窗底部：這題誰答對（同一顆再按一次＝取消） ---- */
function modalScoreHtml(k,i){
  const mk=marks[vkey(k,i)]||'';
  return '<span class="lbl">這題誰答對？</span>'+
    '<button class="sbtn'+(mk==='black'?' on':'')+'" onclick="markFromModal(\'black\','+i+')">⚫ 黑隊</button>'+
    '<button class="sbtn'+(mk==='white'?' on':'')+'" onclick="markFromModal(\'white\','+i+')">⚪ 白隊</button>'+
    '<button class="sbtn'+(mk==='tie'?' on':'')+'" onclick="markFromModal(\'tie\','+i+')">⬜ 平手</button>';
}
function markFromModal(val,i){
  const key=vkey(curKey,i);
  if(marks[key]===val) delete marks[key]; else marks[key]=val;
  visited[key]=true; saveMarks(); saveVisited();
  document.getElementById('m-score').innerHTML=modalScoreHtml(curKey,i);
}
/* ---- 選擇題：顯示 A/B/C/D 選項與正解 ---- */
const OPTL=['A','B','C','D'];
function optsHtml(it){
  if(!it.opts) return '';
  return '<div class="opts">'+it.opts.map((o,i)=>'<div class="opt"><span class="ol">'+OPTL[i]+'</span><span>'+esc(o)+'</span></div>').join('')+'</div>';
}
/* 公布選項：公布題目後，選項先藏著，按這顆才顯示 A/B/C/D */
function optsBlock(it){
  if(!it.opts) return '';
  return '<div class="toggleBox"><button class="btn accent" onclick="tog(this)">📋 公布選項</button>'+
    '<div class="togContent">'+optsHtml(it)+'</div></div>';
}
function mcAns(it){
  if(it.opts && typeof it.correct==='number')
    return '✅ 正確答案：（'+OPTL[it.correct]+'）'+esc(it.opts[it.correct]);
  return '✅ '+esc(it.a||'');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openItem(i,btn){
  const t=theme(curKey); const it=t.items[i];
  visited[vkey(curKey,i)]=true; saveVisited();
  if(btn) btn.classList.add('used');

  document.documentElement.style.setProperty('--accent',t.color);
  document.getElementById('modal').classList.toggle('light', !!t.light);
  document.getElementById('m-dot').style.background=t.color;
  document.getElementById('m-tag').textContent = t.name;
  document.getElementById('m-no').textContent = (i+1);

  const diff = (t.graded && it.star) ? '<div class="diff">'+stars(it.star)+'<span class="grade">'+GRADE[it.star]+'</span></div>' : '';
  let html='<div class="qcols">';

  if(it.kind==="card"){
    html+='<div class="qleft">'+diff+
      '<div class="lead">🔊 請注意看／聽禱告詞，問題就在禱告中！</div>'+
      '<div class="toggleBox show hidebox"><button class="btn beige" onclick="tog(this)">關主：隱藏／顯示禱告詞</button>'+
      '<div class="togContent"><div class="prayerbox">'+esc(it.prayer)+(it.ref?'<span class="pref">—— '+esc(it.ref)+'</span>':'')+'</div></div></div>'+
      '<p class="audionote">禱告詞可先讓大家看、或由關主念出；按「公布題目」時會自動把禱告詞收起來。</p>'+
      '</div><div class="qright">'+
        '<div class="toggleBox"><button class="btn accent" onclick="publish(this)">📣 公布題目</button>'+
        '<div class="togContent">'+
          '<div class="ask">❓ 提問：'+esc(it.ask)+'</div>'+optsBlock(it)+
          '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏答案</button>'+
          '<div class="togContent"><div class="ans">'+mcAns(it)+'</div></div></div>'+
        '</div></div>'+
      '</div>';
  } else if(it.kind==="image"){
    html+='<div class="qleft">'+diff+
      '<div class="lead">👀 請注意看圖片，答案就在圖片中！</div>'+
      '<div class="toggleBox show hidebox"><button class="btn beige" onclick="tog(this)">關主：隱藏／顯示圖片</button>'+
      '<div class="togContent"><img class="qimg" src="images/'+it.img+'?v=2" alt="題目圖片"></div></div>'+
      '<p class="audionote">先讓大家看圖片找答案；按「公布題目」時會自動把圖片收起來。</p>'+
      '</div><div class="qright">'+
        '<div class="toggleBox"><button class="btn accent" onclick="publish(this)">📣 公布題目</button>'+
        '<div class="togContent">'+
          '<div class="ask">❓ 提問：'+esc(it.ask)+'</div>'+optsBlock(it)+
          '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏答案</button>'+
          '<div class="togContent"><div class="ans">'+mcAns(it)+'</div></div></div>'+
        '</div></div>'+
      '</div>';
  } else if(it.kind==="worship"){
    html+='<div class="qleft">'+diff+
      '<div class="lead">🎧 聽前奏，猜歌名！</div>'+
      '<audio controls preload="none" src="audio/'+it.audio+'"></audio>'+
      '<div class="cond">🎯 完成條件：聽出前奏、正確說出歌名即過關。</div>'+
      '</div><div class="qright">'+
        '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏答案</button>'+
        '<div class="togContent"><div class="ans">✅ 答案：'+esc(it.song)+'</div></div></div>'+
      '</div>';
  } else if(it.kind==="fellow"){
    html+='<div class="qleft"><h3>'+(it.mark?'🚩 ':'')+esc(it.q)+'</h3></div>'+
      '<div class="qright">'+optsBlock(it)+
        '<div class="cond fellow">✅ '+esc(it.cond)+'</div></div>';
  } else { /* plain（選擇題） */
    html+='<div class="qleft">'+diff+'<h3>'+esc(it.q||it.prompt)+'</h3></div>'+
      '<div class="qright">'+optsBlock(it)+
        '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏答案</button>'+
        '<div class="togContent"><div class="ans">'+mcAns(it)+'</div></div></div>'+
      '</div>';
  }
  html+='</div>';

  document.getElementById('m-body').innerHTML=html;
  document.getElementById('m-score').innerHTML=modalScoreHtml(curKey,i);
  document.getElementById('overlay').classList.add('active');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('active');
  if(document.getElementById('grid').classList.contains('active')) openTheme(curKey);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

/* ================= RESET ALL ================= */
function resetAll(){
  if(confirm('確定要清除「所有主題」的已選與計分記錄嗎？')){
    visited={}; marks={}; saveVisited(); saveMarks(); alert('已重設！');
  }
}

/* ================= INIT ================= */
buildHome();
</script>
